version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: skereal-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=skereal
    networks:
      - skereal-network

  # Redis for Queue
  redis:
    image: redis:7-alpine
    container_name: skereal-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - skereal-network

volumes:
  mongodb_data:
  redis_data:

networks:
  skereal-network:
    driver: bridge
